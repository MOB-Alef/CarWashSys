{% extends "base.html" %}

{% block title %}
Novo Cliente
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow-sm">

                <div class="card-header">

                    <h3 class="mb-0">
                        Cadastro de Cliente
                    </h3>

                </div>

                <div class="card-body">

                    <form method="post">

                        {% csrf_token %}

                        {{ form.as_p }}

                        <div class="mt-4">

                            <button
                                type="submit"
                                class="btn btn-success">

                                Salvar

                            </button>

                            <a
                                href="{% url 'lista_clientes' %}"
                                class="btn btn-secondary">

                                Cancelar

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
