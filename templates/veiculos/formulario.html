{% extends "base.html" %}

{% block title %}
Veículo
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="card shadow-sm">

        <div class="card-header">

            <h3>

                Cadastro de Veículo

            </h3>

        </div>

        <div class="card-body">

            <form method="post">

                {% csrf_token %}

                {{ form.as_p }}

                <button
                    type="submit"
                    class="btn btn-success">

                    Salvar

                </button>

                <a
                    href="{% url 'lista_veiculos' %}"
                    class="btn btn-secondary">

                    Cancelar

                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
